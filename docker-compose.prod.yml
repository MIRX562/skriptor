services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: skriptor-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skriptor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skriptor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (Used for BullMQ and SSE)
  redis:
    image: redis:8-alpine
    container_name: skriptor-redis
    restart: always
    command: redis-server --requirepass password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. MinIO (S3 Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: skriptor-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console Port
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3b. MinIO Bucket Creator
  minio-create-bucket:
    image: minio/mc:latest
    container_name: skriptor-minio-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set localminio http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}); do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing localminio/${S3_BUCKET};
      exit 0;
      "

  # 4. Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skriptor-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/skriptor
      - REDIS_URL=redis://:password@redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=us-east-1
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - HUGGING_FACE_TOKEN=${HUGGING_FACE_TOKEN}
      - WORKER_SHARED_SECRET=${WORKER_SHARED_SECRET}
    depends_on:
      - db
      - redis
      - minio-create-bucket

  # 5. Transcription Worker
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: skriptor-worker
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - REDIS_URL=redis://:password@redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=us-east-1
      - WORKER_SHARED_SECRET=${WORKER_SHARED_SECRET}
      - HUGGING_FACE_TOKEN=${HUGGING_FACE_TOKEN}
      - BACKEND_CALLBACK_URL=http://web:3000/api/transcribe-upload/worker-callback
      - DEVICE=cuda
    depends_on:
      - redis
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
