services:
  worker:
    build: .
    image: skriptor-worker:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - REDIS_URL=redis://redis:6379
      - BACKEND_CALLBACK_URL=http://app:3000/api/transcribe-upload/worker-callback
      - WORKER_SHARED_SECRET=${WORKER_SHARED_SECRET}
      - HUGGING_FACE_TOKEN=${HUGGING_FACE_TOKEN}
      - DEVICE=cuda
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
