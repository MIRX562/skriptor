services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: skriptor-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skriptor
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skriptor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (Used for BullMQ and SSE)
  redis:
    image: redis:7-alpine
    container_name: skriptor-redis
    restart: always
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. MinIO (S3 Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: skriptor-minio
    restart: always
    environment:
      MINIO_ROOT_USER: mirx
      MINIO_ROOT_PASSWORD: asemjowo
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Console Port
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. MinIO Bucket Creator
  minio-create-bucket:
    image: minio/mc:latest
    container_name: skriptor-minio-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set localminio http://minio:9000 mirx asemjowo); do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing localminio/skriptor-bucket;
      exit 0;
      "

volumes:
  minio_data:
  db_data:
