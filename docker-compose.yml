services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: skriptor-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skriptor
    volumes:
      - ./.docker/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skriptor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (Used for BullMQ and SSE)
  redis:
    image: redis:7-alpine
    container_name: skriptor-redis
    restart: always
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Garage (S3 Compatible Storage)
  garage:
    build:
      context: .
      dockerfile: Dockerfile.garage
    container_name: skriptor-garage
    restart: unless-stopped
    volumes:
      - ./.docker/garage/data:/var/lib/garage/data:z
      - ./.docker/garage/meta:/var/lib/garage/meta:z
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # Admin API
      - "3901:3901" # RPC Port
